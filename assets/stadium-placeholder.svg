  <title id="title">Imagem ilustrativa de estadio</title>
  <desc id="desc">Placeholder para fotos de estadios da Copa.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1732" />
